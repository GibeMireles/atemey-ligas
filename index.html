<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liga Tenis de Mesa Yucatán</title>
  <style>
    :root {
      --navy:       #0A1931;
      --navy-mid:   #132640;
      --navy-light: #1a3055;
      --red:        #C0392B;
      --white:      #ffffff;
      --gray-50:    #f8f9fb;
      --gray-100:   #f1f3f6;
      --gray-200:   #e2e6ec;
      --gray-400:   #9aa3b0;
      --gray-600:   #5a6275;
      --text:       #111827;
      --shadow:     0 2px 10px rgba(0,0,0,0.12);
      --radius:     12px;
      --radius-sm:  8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-100);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 18px 16px 16px;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .logo {
      width: 42px; height: 42px;
      background: var(--red);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-titles h1  { font-size: 1.05rem; font-weight: 700; line-height: 1.25; }
    .header-titles p   { font-size: 0.73rem; opacity: 0.65; margin-top: 2px; }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.5); pointer-events: none; font-size: 12px;
    }

    #torneoSelector {
      width: 100%;
      padding: 9px 32px 9px 12px;
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 0.85rem;
      appearance: none; cursor: pointer; outline: none;
    }
    #torneoSelector:focus { border-color: rgba(255,255,255,0.3); }

    /* ── SEARCH ─────────────────────────────────────────── */
    .search-bar {
      background: var(--white);
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0; z-index: 20;
      box-shadow: var(--shadow);
    }

    .search-inner { position: relative; max-width: 600px; margin: 0 auto; }

    .search-inner svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); pointer-events: none;
    }

    #buscador {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      font-size: 1rem; color: var(--text);
      outline: none; transition: border-color 0.18s;
      background: var(--white);
    }
    #buscador:focus        { border-color: var(--navy); }
    #buscador::placeholder { color: var(--gray-400); }

    /* ── MAIN ───────────────────────────────────────────── */
    #main { padding: 16px; max-width: 640px; margin: 0 auto; }

    /* ── EMPTY STATES ───────────────────────────────────── */
    .state-empty {
      text-align: center;
      padding: 56px 24px;
      color: var(--gray-400);
    }
    .state-empty .icon { font-size: 52px; margin-bottom: 12px; }
    .state-empty p     { font-size: 0.9rem; line-height: 1.5; }

    /* ── JUGADOR CARD ───────────────────────────────────── */
    .jugador-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .jugador-head {
      background: var(--navy);
      color: var(--white);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }

    .jugador-nombre { font-size: 1.1rem; font-weight: 700; }

    .jugador-badge {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      font-size: 0.7rem; padding: 3px 10px; white-space: nowrap;
    }

    /* ── CATEGORÍA ──────────────────────────────────────── */
    .cat-section { border-top: 1px solid var(--gray-200); }

    .cat-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px;
      background: var(--gray-50);
      gap: 8px;
    }

    .cat-nombre { font-weight: 600; font-size: 0.88rem; color: var(--navy); }

    .cat-grupo-badge {
      background: var(--red); color: var(--white);
      font-size: 0.68rem; font-weight: 700;
      padding: 3px 9px; border-radius: 20px; white-space: nowrap;
    }

    .cat-body { padding: 12px 16px 14px; }

    /* ── DAY TABS ───────────────────────────────────────── */
    .day-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }

    .day-tab {
      flex: 1; min-width: 72px;
      padding: 8px 6px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: var(--white);
      font-size: 0.8rem; font-weight: 600;
      color: var(--gray-600);
      cursor: pointer; transition: all 0.15s;
      text-align: center; line-height: 1.3;
    }

    .day-tab.active {
      background: var(--navy); border-color: var(--navy); color: var(--white);
    }

    .day-tab .count {
      display: block; font-size: 0.68rem; font-weight: 400; opacity: 0.75; margin-top: 1px;
    }

    /* ── TIMELINE ───────────────────────────────────────── */
    .day-timeline        { display: none; }
    .day-timeline.active { display: block; }

    .partido {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px solid var(--gray-200);
    }
    .partido:last-child { border-bottom: none; }

    .partido-hora {
      font-size: 0.83rem; font-weight: 700; color: var(--navy);
      min-width: 46px; padding-top: 1px; flex-shrink: 0;
    }

    .partido-detail { flex: 1; min-width: 0; }

    .partido-fase {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .fase-grupos    { color: #2563eb; }
    .fase-octavos   { color: #0891b2; }
    .fase-cuartos   { color: #7c3aed; }
    .fase-semifinal { color: #d97706; }
    .fase-final     { color: var(--red); }

    .partido-rival {
      font-size: 0.9rem; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .partido-rival .rival-name { font-weight: 600; }

    .partido-meta { font-size: 0.72rem; color: var(--gray-400); margin-top: 2px; }

    .no-partidos {
      text-align: center; color: var(--gray-400);
      font-size: 0.83rem; padding: 14px 0 4px;
    }

    /* ── GROUP BUTTON ───────────────────────────────────── */
    .btn-grupo {
      display: flex; align-items: center; gap: 7px;
      width: 100%; margin-top: 14px;
      padding: 10px 14px;
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: 0.83rem; font-weight: 600; color: var(--navy);
      cursor: pointer; transition: background 0.15s; text-align: left;
    }
    .btn-grupo:hover, .btn-grupo:active { background: var(--gray-200); }

    /* ── MODAL ──────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-sheet {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 8px 0 0;
      width: 100%; max-width: 640px; max-height: 78vh;
      overflow-y: auto;
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--gray-200); border-radius: 4px;
      margin: 0 auto 16px;
    }

    .modal-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 0 20px 14px;
      border-bottom: 1px solid var(--gray-200);
    }

    .modal-title    { font-size: 1rem; font-weight: 700; color: var(--navy); line-height: 1.3; }
    .modal-subtitle { font-size: 0.75rem; color: var(--gray-400); margin-top: 2px; }

    .modal-close {
      width: 28px; height: 28px;
      background: var(--gray-100); border: none; border-radius: 50%;
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 8px; margin-top: 2px;
    }

    .modal-body { padding: 8px 20px 24px; }

    .grupo-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid var(--gray-100);
    }
    .grupo-row:last-child { border-bottom: none; }

    .grupo-num {
      width: 26px; height: 26px;
      background: var(--navy); color: var(--white);
      border-radius: 50%;
      font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .grupo-num.me { background: var(--red); }

    .grupo-jugador-nombre { font-size: 0.9rem; flex: 1; }

    .yo-tag {
      font-size: 0.65rem; background: var(--red); color: var(--white);
      padding: 2px 7px; border-radius: 10px; font-weight: 700;
    }

    /* ── LOADING ────────────────────────────────────────── */
    .loading { text-align: center; color: var(--gray-400); padding: 40px 20px; font-size: 0.9rem; }

    /* ── PRÓXIMOS EVENTOS ───────────────────────────────── */
    .evt-section {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 16px 4px;
    }

    .evt-titulo {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--gray-400);
      margin-bottom: 4px;
    }

    .evt-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: 0.82rem;
      line-height: 1.3;
    }
    .evt-row:last-of-type { border-bottom: none; }

    .evt-row.is-link {
      cursor: pointer;
      margin: 0 -16px;
      padding: 7px 16px;
      transition: background 0.13s;
    }
    .evt-row.is-link:hover { background: var(--gray-50); }

    .evt-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .evt-badge.liga     { background: var(--gray-100); color: var(--gray-600); }
    .evt-badge.nacional { background: var(--red);      color: var(--white); }

    .evt-info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .evt-info .evt-venue { color: var(--gray-400); }

    .evt-fecha {
      font-size: 0.74rem;
      color: var(--gray-400);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .evt-ver-todos {
      display: block;
      width: 100%;
      padding: 7px 0 9px;
      background: none;
      border: none;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      text-align: center;
      opacity: 0.65;
    }
    .evt-ver-todos:hover { opacity: 1; }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (min-width: 480px) {
      header { padding: 22px 20px 18px; }
      #main  { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-row">
    <div class="logo">🏓</div>
    <div class="header-titles">
      <h1>Liga Tenis de Mesa Yucatán</h1>
      <p>Consulta el horario de tu jugador/a</p>
    </div>
  </div>
  <div class="select-wrap">
    <select id="torneoSelector"></select>
  </div>
</header>

<!-- PRÓXIMOS EVENTOS (renderizado por JS) -->
<div id="evtSection"></div>

<!-- SEARCH -->
<div class="search-bar">
  <div class="search-inner">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="buscador" type="search" autocomplete="off" autocorrect="off"
           placeholder="Escribe el nombre de tu hijo/a…">
  </div>
</div>

<!-- RESULTS -->
<div id="main">
  <div class="state-empty">
    <div class="icon">🏓</div>
    <p>Escribe el nombre de un jugador<br>para ver sus horarios</p>
  </div>
</div>

<!-- GROUP MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─── Labels ───────────────────────────────────────────────────────────────────
const FASE_LABEL = {
  grupos:    'Fase de grupos',
  octavos:   'Octavos de final',
  cuartos:   'Cuartos de final',
  semifinal: 'Semifinal',
  final:     'Final'
};

// ─── State ────────────────────────────────────────────────────────────────────
let torneoData = null;
let debounceTimer = null;

// ─── Bootstrap ────────────────────────────────────────────────────────────────
(async function init() {
  const sel = document.getElementById('torneoSelector');
  try {
    const res = await fetch('data/tournaments.json');
    const data = await res.json();
    const { torneos, proximos_eventos } = data;
    if (!torneos || !torneos.length) throw new Error('empty');
    sel.innerHTML = torneos
      .map(t => `<option value="${t.archivo}">${t.nombre}</option>`)
      .join('');
    sel.addEventListener('change', () => loadTorneo(sel.value));
    renderEventos(proximos_eventos || []);
    await loadTorneo(torneos[0].archivo);
  } catch {
    sel.innerHTML = '<option value="">Sin torneos disponibles</option>';
    showMain(emptyState('⚠️', 'No se pudo cargar la lista de torneos'));
  }
})();

async function loadTorneo(archivo) {
  document.getElementById('buscador').value = '';
  showMain('<div class="loading">Cargando datos…</div>');
  try {
    const res = await fetch('data/' + archivo);
    if (!res.ok) throw new Error(res.status);
    torneoData = await res.json();
    showMain(emptyState('🏓', 'Escribe el nombre de un jugador<br>para ver sus horarios'));
  } catch {
    torneoData = null;
    showMain(emptyState('⚠️', 'No se pudo cargar el torneo'));
  }
}

// ─── Search ───────────────────────────────────────────────────────────────────
document.getElementById('buscador').addEventListener('input', function () {
  clearTimeout(debounceTimer);
  const q = this.value.trim();
  if (q.length < 2) {
    showMain(emptyState('🏓', 'Escribe el nombre de un jugador<br>para ver sus horarios'));
    return;
  }
  debounceTimer = setTimeout(() => search(q), 160);
});

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

function search(q) {
  if (!torneoData) return;
  const qn = norm(q);
  const hits = (torneoData.jugadores || []).filter(j => norm(j.nombre).includes(qn));
  if (!hits.length) {
    showMain(emptyState('😕', 'No se encontró "<strong>' + q + '</strong>"'));
    return;
  }
  showMain(hits.map(renderJugador).join(''));
}

// ─── Render: jugador ──────────────────────────────────────────────────────────
function renderJugador(j) {
  const n = (j.categorias || []).length;
  return `
    <div class="jugador-card">
      <div class="jugador-head">
        <span class="jugador-nombre">${esc(j.nombre)}</span>
        <span class="jugador-badge">${n} categoría${n !== 1 ? 's' : ''}</span>
      </div>
      ${(j.categorias || []).map(c => renderCategoria(j.nombre, c)).join('')}
    </div>`;
}

// ─── Render: categoría ────────────────────────────────────────────────────────
function renderCategoria(nombreJugador, cat) {
  // ID seguro para el DOM
  const uid = norm(nombreJugador + '_' + cat.nombre).replace(/[^a-z0-9]/g, '_');

  // Extraer días únicos en orden de aparición desde los partidos
  const diasOrdenados = [];
  const diasSeen = new Set();
  (cat.partidos || []).forEach(p => {
    if (p.dia && !diasSeen.has(p.dia)) {
      diasSeen.add(p.dia);
      diasOrdenados.push(p.dia);
    }
  });

  // Agrupar partidos por día y ordenar por hora
  const porDia = {};
  diasOrdenados.forEach(d => (porDia[d] = []));
  (cat.partidos || []).forEach(p => {
    if (p.dia && porDia[p.dia]) porDia[p.dia].push(p);
  });
  diasOrdenados.forEach(d => porDia[d].sort((a, b) => a.hora.localeCompare(b.hora)));

  const primerDia = diasOrdenados[0] || '';

  // Pestañas de días
  const tabs = diasOrdenados.map(d => {
    const n = porDia[d].length;
    return `<button class="day-tab ${d === primerDia ? 'active' : ''}"
      data-uid="${uid}" data-dia="${esc(d)}"
      onclick="switchDay(this)">
      ${esc(d)}
      <span class="count">${n} partido${n !== 1 ? 's' : ''}</span>
    </button>`;
  }).join('');

  // Timelines por día
  const timelines = diasOrdenados.map(d => `
    <div class="day-timeline ${d === primerDia ? 'active' : ''}" id="${uid}_day_${norm(d).replace(/[^a-z0-9]/g,'_')}">
      ${porDia[d].length
        ? porDia[d].map(renderPartido).join('')
        : '<div class="no-partidos">Sin partidos este día</div>'}
    </div>`
  ).join('');

  // Datos del grupo para el modal (evitar inyección: JSON encodificado en atributo)
  const grupoData = esc(JSON.stringify({
    categoria: cat.nombre,
    grupo: cat.grupo,
    jugadores: cat.jugadores_grupo || [],
    yo: nombreJugador
  }));

  return `
    <div class="cat-section">
      <div class="cat-head">
        <span class="cat-nombre">${esc(cat.nombre)}</span>
        <span class="cat-grupo-badge">${esc(cat.grupo)}</span>
      </div>
      <div class="cat-body">
        ${diasOrdenados.length > 1 ? `<div class="day-tabs">${tabs}</div>` : ''}
        ${timelines}
        <button class="btn-grupo" data-grupo='${grupoData}' onclick="openGrupo(this)">
          👥 Ver todos del ${esc(cat.grupo)}
        </button>
      </div>
    </div>`;
}

// ─── Render: partido ──────────────────────────────────────────────────────────
function renderPartido(p) {
  const faseKey   = (p.fase || '').toLowerCase();
  const faseLabel = FASE_LABEL[faseKey] || p.fase || '';
  const rival     = p.rival
    ? `vs <span class="rival-name">${esc(p.rival)}</span>`
    : '<span style="color:var(--gray-400);font-style:italic">Rival por definir</span>';
  const meta = [p.mesa ? 'Mesa ' + p.mesa : '', p.nota || ''].filter(Boolean).join(' · ');
  return `
    <div class="partido">
      <div class="partido-hora">${esc(p.hora)}</div>
      <div class="partido-detail">
        <div class="partido-fase fase-${faseKey}">${faseLabel}</div>
        <div class="partido-rival">${rival}</div>
        ${meta ? `<div class="partido-meta">${esc(meta)}</div>` : ''}
      </div>
    </div>`;
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchDay(btn) {
  const uid = btn.dataset.uid;
  const dia = btn.dataset.dia;
  const diaId = norm(dia).replace(/[^a-z0-9]/g, '_');

  // Deactivate all tabs in this category
  btn.closest('.cat-body').querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Show the correct timeline
  btn.closest('.cat-body').querySelectorAll('.day-timeline').forEach(el => {
    el.classList.toggle('active', el.id === uid + '_day_' + diaId);
  });
}

// ─── Group modal ──────────────────────────────────────────────────────────────
function openGrupo(btn) {
  const data = JSON.parse(btn.dataset.grupo);
  document.getElementById('modalTitle').textContent =
    data.categoria + ' — ' + data.grupo;
  document.getElementById('modalSubtitle').textContent =
    data.jugadores.length
      ? data.jugadores.length + ' jugador' + (data.jugadores.length !== 1 ? 'es' : '') + ' en este grupo'
      : '';
  document.getElementById('modalBody').innerHTML =
    data.jugadores.length
      ? data.jugadores.map((nombre, i) => `
          <div class="grupo-row">
            <div class="grupo-num ${nombre === data.yo ? 'me' : ''}">${i + 1}</div>
            <div class="grupo-jugador-nombre">${esc(nombre)}</div>
            ${nombre === data.yo ? '<span class="yo-tag">TÚ</span>' : ''}
          </div>`).join('')
      : '<p style="color:var(--gray-400);font-size:.85rem;padding:12px 0">Sin datos de grupo disponibles</p>';
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ─── Próximos eventos ─────────────────────────────────────────────────────────
const MAX_VISIBLE = 3;

function renderEventos(eventos) {
  const hoy = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const vigentes = eventos.filter(e => e.fecha_fin >= hoy);
  const seccion = document.getElementById('evtSection');
  if (!vigentes.length) { seccion.innerHTML = ''; return; }

  const visible  = vigentes.slice(0, MAX_VISIBLE);
  const ocultos  = vigentes.slice(MAX_VISIBLE);
  const hayMas   = ocultos.length > 0;

  seccion.innerHTML = `
    <div class="evt-section">
      <div class="evt-titulo">Próximos eventos</div>
      <div id="evtList">
        ${visible.map(renderEvtRow).join('')}
      </div>
      ${hayMas
        ? `<button class="evt-ver-todos" onclick="toggleEventos(this)"
             data-total="${vigentes.length}">
             Ver todos (${vigentes.length}) ▾
           </button>`
        : ''}
    </div>`;

  if (hayMas) {
    seccion.querySelector('#evtList').dataset.ocultos = JSON.stringify(ocultos);
  }
}

function renderEvtRow(evt) {
  const esLink  = !!evt.archivo;
  const fecha   = formatFecha(evt.fecha_inicio, evt.fecha_fin);
  const tipo    = (evt.tipo || 'liga').toLowerCase();
  const badgeLbl = tipo === 'nacional' ? 'Nacional' : 'Liga';
  const onclick = esLink
    ? `onclick="cargarDesdeEvento('${esc(evt.archivo)}')" role="button" tabindex="0"`
    : '';
  return `
    <div class="evt-row${esLink ? ' is-link' : ''}" ${onclick}>
      <span class="evt-badge ${tipo}">${badgeLbl}</span>
      <span class="evt-info">
        ${esc(evt.nombre)}${evt.venue ? ` <span class="evt-venue">· ${esc(evt.venue)}</span>` : ''}
      </span>
      <span class="evt-fecha">${fecha}</span>
    </div>`;
}

function toggleEventos(btn) {
  const list    = document.getElementById('evtList');
  const ocultos = JSON.parse(list.dataset.ocultos || '[]');
  list.insertAdjacentHTML('beforeend', ocultos.map(renderEvtRow).join(''));
  list.dataset.ocultos = '[]';
  btn.remove();
}

function cargarDesdeEvento(archivo) {
  const sel = document.getElementById('torneoSelector');
  sel.value = archivo;
  loadTorneo(archivo);
  document.getElementById('buscador').focus();
}

function formatFecha(inicio, fin) {
  const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const d1 = new Date(inicio + 'T00:00:00');
  const d2 = new Date(fin    + 'T00:00:00');
  const m1 = MESES[d1.getMonth()];
  const m2 = MESES[d2.getMonth()];
  if (inicio === fin)              return `${d1.getDate()} ${m1}`;
  if (d1.getMonth() === d2.getMonth()) return `${d1.getDate()}–${d2.getDate()} ${m1}`;
  return `${d1.getDate()} ${m1} – ${d2.getDate()} ${m2}`;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function showMain(html) { document.getElementById('main').innerHTML = html; }

function emptyState(icon, msg) {
  return `<div class="state-empty"><div class="icon">${icon}</div><p>${msg}</p></div>`;
}

// Escapar HTML para evitar XSS al renderizar datos del JSON
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
